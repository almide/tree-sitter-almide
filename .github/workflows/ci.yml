name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli
      - name: Generate parser
        run: tree-sitter generate
      - name: Run tests
        run: tree-sitter test
